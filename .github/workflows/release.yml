name: Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Portfolio ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🚀 Portfolio ${{ steps.tag.outputs.tag }}

            A high-performance, SEO-optimized portfolio website built with Astro and JavaScript,
            featuring Enterprise + AI theming, completed across 12 development phases.

            ### ✅ What's Included
            - Enterprise + AI design system with deep dark theme and glassmorphism
            - Fully responsive layout with Navbar, Hero, and ProjectCard components
            - SEO-optimized pages with sitemap, robots.txt, and structured data (JSON-LD)
            - Production-ready build with HTML/JS/CSS minification via Terser
            - Security headers configured for Vercel deployment
            - Aggressive CDN caching strategy (1-year max-age for static assets)
            - Full accessibility support (ARIA labels, keyboard navigation)
            - Optimized for Core Web Vitals

            ### 📦 Build Quality
            - Production build validated through CI pipelines
            - Assets optimized for fast load times and efficient caching
            - Designed to maintain a zero-known-issues release standard

            ### 🔗 Deployment
            Deploy instantly to Vercel:
            ```bash
            vercel --prod
            ```
          generate_release_notes: false
          draft: false
          prerelease: false
